name: terraform-test

# Native `terraform test` as a required PR gate. The suites use mocked azurerm
# providers (command = plan), so this job needs NO Azure credentials and creates
# NO real infrastructure — it runs on PRs from any branch/fork.
on:
  pull_request:
    branches: [master, develop, main]
    paths:
      - "**.tf"
      - "**.tftest.hcl"
      - ".github/workflows/terraform-test.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tf-test-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - bootstrap
          - foundation/modules/network
          - foundation/modules/cluster
          - foundation/modules/monitor
          - workload/modules/alb-controller
    steps:
      - name: Checkout
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: "~> 1.10"

      - name: Terraform fmt
        run: terraform fmt -check -recursive ${{ matrix.module }}

      - name: Terraform init
        run: terraform -chdir=${{ matrix.module }} init -input=false -backend=false

      - name: Terraform test
        run: terraform -chdir=${{ matrix.module }} test -no-color
