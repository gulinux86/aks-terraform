name: terraform-deploy

# Manual, controlled deploys: you pick the environment and layer when you run it.
# Nothing applies automatically on merge. PROD is gated by the `prod` GitHub
# Environment (required reviewer). Apply always uses a saved plan. In-cluster
# checks run through `az aks command invoke` — the API server stays private.
on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options: [hml, prod]
      layer:
        description: "Which layer(s) to apply"
        required: true
        default: both
        type: choice
        options: [foundation, workload, both]

permissions:
  contents: read
  id-token: write # OIDC

env:
  ARM_USE_OIDC: "true"
  ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
  ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}

jobs:
  # Gate 1 — critical-module unit tests. Mocked providers (no Azure creds, no
  # infra), env/layer-agnostic, so they run the same for hml and prod on every
  # deploy. A failure blocks the apply.
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read # credential-free
    strategy:
      fail-fast: true
      matrix:
        module:
          - bootstrap
          - foundation/modules/network
          - foundation/modules/cluster
          - workload/modules/alb-controller
    steps:
      - name: Checkout
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: "~> 1.10"

      - name: Terraform fmt
        run: terraform fmt -check -recursive ${{ matrix.module }}

      - name: Terraform test
        run: |
          terraform -chdir=${{ matrix.module }} init -input=false -backend=false
          terraform -chdir=${{ matrix.module }} test -no-color

  # Gate 2 — Trivy IaC misconfiguration scan. Fails on HIGH/CRITICAL using the
  # committed .trivyignore. Same scan for hml and prod; a hard pre-apply gate.
  security:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3

      - name: Trivy config scan (gate)
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          scan-type: config
          scan-ref: .
          format: table
          severity: HIGH,CRITICAL
          trivyignores: .trivyignore
          exit-code: "1"

  deploy:
    needs: [test, security] # apply only after both gates pass
    runs-on: ubuntu-latest
    # Ties to the GitHub Environment: `prod` carries the required reviewer, so a
    # prod run pauses for approval before this job starts.
    environment: ${{ github.event.inputs.environment }}
    # Never run two applies for the same env at once; never cancel one mid-apply.
    concurrency:
      group: terraform-${{ github.event.inputs.environment }}
      cancel-in-progress: false
    env:
      ENVIRONMENT: ${{ github.event.inputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3

      - name: Azure login (federated OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: "~> 1.10"

      - name: Resolve layers
        run: |
          # "both" must apply foundation BEFORE workload (workload reads its state).
          if [ "${{ github.event.inputs.layer }}" = "both" ]; then
            echo "LAYERS=foundation workload" >> "$GITHUB_ENV"
          else
            echo "LAYERS=${{ github.event.inputs.layer }}" >> "$GITHUB_ENV"
          fi

      - name: Apply (saved plan per layer)
        run: |
          set -euo pipefail
          for L in $LAYERS; do
            echo "::group::terraform $L ($ENVIRONMENT)"
            terraform -chdir="$L" init -input=false \
              -backend-config="environments/${ENVIRONMENT}/backend.hcl"
            # plan -out then apply the saved plan — never re-plan at apply time.
            terraform -chdir="$L" plan -input=false -out=tfplan \
              -var-file="environments/${ENVIRONMENT}/terraform.tfvars"
            terraform -chdir="$L" apply -input=false -auto-approve tfplan
            echo "::endgroup::"
          done

      # In-cluster verification WITHOUT network reach to the private API server:
      # `az aks command invoke` tunnels kubectl through the AKS managed control
      # plane. Runs after a workload apply to confirm the ALB Controller is up.
      - name: Verify ALB Controller via command invoke
        if: contains(env.LAYERS, 'workload')
        run: |
          set -euo pipefail
          terraform -chdir=foundation init -input=false \
            -backend-config="environments/${ENVIRONMENT}/backend.hcl" >/dev/null
          RG=$(terraform -chdir=foundation output -raw resource_group_name)
          CLUSTER=$(terraform -chdir=foundation output -raw cluster_name)
          az aks command invoke \
            --resource-group "$RG" \
            --name "$CLUSTER" \
            --command "kubectl get pods -n azure-alb-system -o wide"
