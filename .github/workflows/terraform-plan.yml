name: terraform-plan

# Plan as read-only feedback:
#   - automatically on PRs to develop/main (env inferred from the base branch),
#     posted as a PR comment so you review the diff before deploying;
#   - on demand via workflow_dispatch, where you pick the environment.
# Auth is GitHub OIDC → Azure (Workload Identity Federation), no client secret.
on:
  pull_request:
    branches: [master, develop, main]
    paths:
      - "**.tf"
      - "**.tfvars"
      - "**.hcl"
      - "**.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to plan"
        required: true
        type: choice
        options: [hml, prod]

permissions:
  contents: read
  id-token: write # OIDC token for azure/login + terraform
  pull-requests: write # post the plan comment (PR runs only)

concurrency:
  group: tf-plan-${{ github.event.pull_request.number || github.event.inputs.environment }}
  cancel-in-progress: true

env:
  ARM_USE_OIDC: "true"
  ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
  ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
  # Injected list var (kept out of the committed tfvars). HCL list literal.
  TF_VAR_cluster_admin_object_ids: ${{ vars.AKS_CLUSTER_ADMIN_OBJECT_IDS }}

jobs:
  plan:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        layer: [foundation, workload]
    steps:
      - name: Checkout
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3

      # Manual dispatch → use the chosen environment; PR → infer from base branch.
      - name: Select environment
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ENV="${{ github.event.inputs.environment }}"
          elif [ "${{ github.base_ref }}" = "main" ]; then
            ENV="prod"
          else
            ENV="hml"
          fi
          echo "ENV_NAME=$ENV" >> "$GITHUB_ENV"

      - name: Azure login (federated OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: "~> 1.10"

      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - name: Terraform init
        run: terraform -chdir=${{ matrix.layer }} init -backend-config=environments/${{ env.ENV_NAME }}/backend.hcl

      - name: Terraform validate
        run: terraform -chdir=${{ matrix.layer }} validate

      - name: Terraform plan
        id: plan
        run: |
          set +e

          # Greenfield/torn-down guard: the workload layer reads foundation's
          # remote state. Skip the workload plan when foundation has no outputs
          # for this env — either it was never applied, or it was destroyed (the
          # state object still exists but is empty). Checking outputs (not just
          # the blob's existence) covers both cases.
          if [ "${{ matrix.layer }}" = "workload" ]; then
            HCL="foundation/environments/${ENV_NAME}/backend.hcl"
            SA=$(sed -nE 's/^[[:space:]]*storage_account_name[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/p' "$HCL")
            CONTAINER=$(sed -nE 's/^[[:space:]]*container_name[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/p' "$HCL")
            KEY=$(sed -nE 's/^[[:space:]]*key[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/p' "$HCL")
            FOUNDATION_OUTPUTS=$(az storage blob download \
              --account-name "$SA" --container-name "$CONTAINER" --name "$KEY" \
              --auth-mode login -o tsv --query content 2>/dev/null \
              | jq -r '.outputs | length' 2>/dev/null || echo 0)
            if [ "${FOUNDATION_OUTPUTS:-0}" = "0" ]; then
              {
                echo "Skipped: foundation layer has no outputs for '${ENV_NAME}' yet."
                echo
                echo "The workload layer reads the foundation layer's remote state, which is"
                echo "either not applied yet or was destroyed (empty state). Apply the foundation"
                echo "layer for '${ENV_NAME}' (terraform-deploy → layer: foundation), then re-run."
              } > /tmp/plan_output.txt
              echo "skipped=true" >> "$GITHUB_OUTPUT"
              echo "exitcode=0" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          terraform -chdir=${{ matrix.layer }} plan -no-color -input=false \
            -var-file=environments/${{ env.ENV_NAME }}/terraform.tfvars \
            > /tmp/plan_output.txt 2>&1
          echo "exitcode=$?" >> "$GITHUB_OUTPUT"

      # On PRs: post/update the plan as a comment.
      - name: Comment plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const fs = require('fs');
            const layer = '${{ matrix.layer }}';
            const code = '${{ steps.plan.outputs.exitcode }}';
            const skipped = '${{ steps.plan.outputs.skipped }}' === 'true';
            const tag = `<!-- tf-plan-bot-${layer} -->`;
            let plan = fs.readFileSync('/tmp/plan_output.txt', 'utf8');
            // exit 0 = no changes, 2 = changes (both fine), 1 = error.
            const status = skipped ? '⏭️' : (code !== '1' ? '✅' : '❌');
            if (plan.length > 60000) plan = plan.slice(0, 60000) + '\n... (truncated)';
            const body = `${tag}\n## ${status} Terraform Plan — \`${layer}\` (${process.env.ENV_NAME})\n\n<details><summary>Show plan</summary>\n\n\`\`\`\n${plan}\n\`\`\`\n\n</details>`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(tag));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.issue.number, body,
              });
            }

      # On manual dispatch: just surface the plan in the job log.
      - name: Show plan (dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: cat /tmp/plan_output.txt

      - name: Fail on plan error
        if: steps.plan.outputs.exitcode == '1'
        run: |
          echo "terraform plan failed:" >&2
          cat /tmp/plan_output.txt >&2
          exit 1
